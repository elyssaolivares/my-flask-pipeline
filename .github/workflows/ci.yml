name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-code:
    name: Lint and Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Linter (Flake8 Static Quality Scan)
        run: flake8 app/

      - name: Run Automated Test Framework (PyTest)
        run: pytest tests/
